name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install packages
        run: |
          Rscript -e "install.packages(c('survival', 'MatchIt', 'cobalt',
                                         'WeightIt', 'tableone'),
                                        type = 'binary')"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Run analysis tests
        run: Rscript tests/test-analysis.R